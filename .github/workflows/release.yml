name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: install uv
        uses: astral-sh/setup-uv@v7

      - name: check tag matches version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(uv version --short)"
          if [ "$tag" != "$pkg" ]; then
            echo "tag $GITHUB_REF_NAME does not match pyproject version $pkg" >&2
            exit 1
          fi

      - name: build
        run: uv build

      - name: upload dist
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    name: publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/anga-grid
    permissions:
      id-token: write
    steps:
      - name: download dist
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: publish
        uses: pypa/gh-action-pypi-publish@release/v1
